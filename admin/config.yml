backend:
  name: github
  repo: kinukimama/kinukimama
  branch: main
  app_id: Ov23litGoRlMfj0yVNx2
  base_url: https://comforting-bonbon-07e4ad.netlify.app

locale: ja
media_folder: images
public_folder: images

collections:
  - name: news
    label: お知らせ管理
    files:
      - name: news_data
        label: お知らせ一覧
        file: news.json
        fields:
          - label: お知らせ一覧
            name: items
            widget: list
            summary: "{{fields.date}} ／ {{fields.title}}"
            fields:
              - label: 日付
                name: date
                widget: datetime
                format: "YYYY-MM-DD"
                date_format: "YYYY-MM-DD"
                time_format: false
                required: true
              - label: タグ
                name: tag
                widget: select
                options:
                  - { label: "お知らせ", value: "お知らせ" }
                  - { label: "キャンペーン", value: "キャンペーン" }
                  - { label: "休業", value: "休業" }
                  - { label: "新メニュー", value: "新メニュー" }
                  - { label: "その他", value: "その他" }
                required: true
              - label: タイトル
                name: title
                widget: string
                required: true
              - label: 本文
                name: body
                widget: markdown
                required: true
              - label: リンクURL（任意）
                name: link
                widget: string
                required: false
              - label: リンクテキスト（任意）
                name: linkText
                widget: string
                required: false
                hint: "リンクURLを入力した場合のみ有効です"